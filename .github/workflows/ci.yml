name: Build and test Python package

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Lint with ruff
        run: |
          uvx ruff check .
          uvx ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --frozen --extra dev
      - name: Test with pytest
        run: uv run pytest -n auto
      - name: Upload coverage report
        if: github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          # Codecov-side failures (e.g. the 2026-07-09 "BAD signature"
          # CDN skew on the `latest` CLI) must not red-X the test job —
          # coverage upload is best-effort, the tests already passed.
          fail_ci_if_error: false
      - name: Upload test results
        if: ${{ !cancelled() && github.actor != 'dependabot[bot]' }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: "test_results"

  test-with-casperfpga:
    # Smoke test that the pinned casperfpga in hardware-requirements.txt
    # still installs, that its submodule layout still matches what
    # blocks.py / fpga.py import, and that the test suite stays green
    # with the real casperfpga available (not just the dummy path).
    #
    # 3.12+ is unlocked by casperfpga 0.7.1: backports.ssl_match_hostname
    # was re-added for tornado 4.x on 3.12, and Thread.setDaemon/isAlive
    # were replaced for 3.13. 3.14 is one ahead of casperfpga's own CI
    # ceiling but installs cleanly; demote to 3.13 if the matrix flakes.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies with casperfpga
        run: |
          uv sync --frozen --extra dev
          uv pip install -r hardware-requirements.txt
      - name: Verify USE_CASPERFPGA is True with the fork installed
        run: |
          uv run python -c "
          import eigsep_observing.fpga
          assert eigsep_observing.fpga.USE_CASPERFPGA, (
              'USE_CASPERFPGA is False despite casperfpga being installed'
          )
          "
      - name: Test with pytest
        # tests/test_casperfpga_api.py is a consumer-contract test that
        # asserts the exact casperfpga symbols and methods this repo
        # uses. It runs here (real fork installed) and is auto-skipped
        # in the dummy-mode test job above.
        run: uv run pytest -n auto
