name: Build and test Python package

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Lint with ruff
        run: |
          ruff check .
          ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]
      - name: Test with pytest
        run: |
          pytest -n auto
      - name: Upload coverage report
        if: github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
      - name: Upload test results
        if: ${{ !cancelled() && github.actor != 'dependabot[bot]' }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  test-with-casperfpga:
    # Smoke test that the pinned casperfpga in hardware-requirements.txt
    # still installs, that its submodule layout still matches what
    # blocks.py / fpga.py import, and that the test suite stays green
    # with the real casperfpga available (not just the dummy path).
    #
    # Python 3.12+ blocked: katcp 0.9.3 requires tornado<5 which
    # uses backports.ssl_match_hostname (removed in 3.12).
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies with casperfpga
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]
          python -m pip install -r hardware-requirements.txt
      - name: Verify USE_CASPERFPGA is True with the fork installed
        run: |
          python -c "
          import eigsep_observing.fpga
          assert eigsep_observing.fpga.USE_CASPERFPGA, (
              'USE_CASPERFPGA is False despite casperfpga being installed'
          )
          "
      - name: Test with pytest
        # tests/test_casperfpga_api.py is a consumer-contract test that
        # asserts the exact casperfpga symbols and methods this repo
        # uses. It runs here (real fork installed) and is auto-skipped
        # in the dummy-mode test job above.
        run: |
          pytest -n auto
