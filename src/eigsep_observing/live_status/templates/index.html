<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>EIGSEP live status</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
<script src="{{ url_for('plotly_js') }}"></script>
</head>
<body>
<header>
  <h1>EIGSEP live status</h1>
  <div id="health-summary" class="health">
    <span class="tile" id="tile-snap-fpga" title="SNAP FPGA reachability. 'live' = corr stream is flowing (proves SNAP responds at the casperfpga level). 'reachable' = corr is idle but a TCP connect to the katcp port (7147) succeeds. 'unreachable' = probe failed. 'unknown' = no snap_ip configured yet.">SNAP FPGA: ?</span>
    <span class="tile" id="tile-backend-redis" title="Backend Redis (rpi_ip) liveness. Any successful read on the SNAP-side Redis flips this green.">Backend Redis: ?</span>
    <span class="tile" id="tile-panda-observe" title="Panda observe script. 'running' = fresh heartbeat from panda_observe (or sibling script). 'script idle' = panda Redis is up but no script is publishing the heartbeat. 'panda offline' = panda Redis itself is unreachable.">Panda observe: ?</span>
    <span class="tile" id="tile-corr-loop" title="Corr loop. 'recording' = a new corr integration arrived within 2.5x the integration cadence — eigsep-fpga-init is publishing data. 'idle' = no new integration in that window.">Corr loop: ?</span>
    <span class="tile" id="tile-file">Last file: ?</span>
    <span class="tile" id="tile-reinit" title="SNAP --reinit count since the last Redis flush. Bumps on every supervised crash-recovery.">Reinits: ?</span>
    <span class="tile" id="tile-run" title="Active panda script (panda_observe / no_switch_observation / vna_position_sweep). 'idle' means no script is currently driving the run.">Run: ?</span>
    <label class="toggle" title="Use antenna names from wiring.yaml (falls back to raw inputs when wiring is missing).">
      <input type="checkbox" id="toggle-wiring">
      <span>Wiring labels</span>
    </label>
    <label class="toggle" title="Convert spectra to Kelvin using the most recent RFNON / RFNOFF integrations (first-order Y-factor cal). Falls back to raw if the on/off cache is missing; an off-schedule switch is surfaced separately on the RF switch tile.">
      <input type="checkbox" id="toggle-calibrated">
      <span>Calibrated (T_sky)</span>
    </label>
  </div>
  <div id="calibration-bar" class="cal-bar" hidden></div>
</header>

<main class="grid">
  <section class="card wide">
    <h2>Correlation spectra</h2>
    <div id="plot-mag" class="plot"></div>
    <div id="plot-phase" class="plot"></div>
    <div id="corr-adc-section" class="adc-section"></div>
  </section>

  <section class="card wide">
    <div class="card-header">
      <h2>VNA S11 (ideal-OSL calibrated)</h2>
      <div class="vna-mode-toggle" role="group" aria-label="VNA mode">
        <button type="button" class="vna-mode-btn active" data-vna-mode="ant" aria-pressed="true">Antenna</button>
        <button type="button" class="vna-mode-btn" data-vna-mode="rec" aria-pressed="false">Receiver</button>
      </div>
    </div>
    <div id="vna-status" class="vna-status">No measurement yet.</div>
    <div id="plot-vna" class="plot"></div>
  </section>

  <section class="card wide">
    <h2>Tempctrl</h2>
    <div class="two-col-grid">
      <div id="tempctrl-lna-block" class="col-block"></div>
      <div id="tempctrl-load-block" class="col-block"></div>
    </div>
  </section>

  <section class="card wide">
    <h2>IMU</h2>
    <div class="two-col-grid">
      <div id="imu-el-block" class="col-block"></div>
      <div id="imu-az-block" class="col-block"></div>
    </div>
  </section>

  <section class="card wide">
    <h2>Motor</h2>
    <div class="two-col-grid">
      <div id="motor-az-block" class="col-block"></div>
      <div id="motor-el-block" class="col-block"></div>
    </div>
  </section>

  <section class="card">
    <h2>RF switch</h2>
    <div id="rfswitch"></div>
  </section>

  <section class="card">
    <h2>Potmon</h2>
    <div id="potmon-block"></div>
  </section>

  <section class="card">
    <h2>Lidar</h2>
    <div id="lidar-block"></div>
  </section>

  <section class="card wide">
    <h2>Event log (status stream)</h2>
    <ul id="status-log"></ul>
  </section>
</main>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
