<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>EIGSEP live status</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
<script src="{{ url_for('plotly_js') }}"></script>
</head>
<body>
<header>
  <h1>EIGSEP live status</h1>
  <div id="health-summary" class="health">
    <span class="tile" id="tile-snap">SNAP: ?</span>
    <span class="tile" id="tile-panda">Panda: ?</span>
    <span class="tile" id="tile-observing">Observing: ?</span>
    <span class="tile" id="tile-file">Last file: ?</span>
    <span class="tile" id="tile-reinit" title="SNAP --reinit count since the last Redis flush. Bumps on every supervised crash-recovery.">Reinits: ?</span>
    <span class="tile" id="tile-run" title="Active panda script (panda_observe / no_switch_observation / vna_position_sweep). 'idle' means no script is currently driving the run.">Run: ?</span>
    <label class="toggle" title="Use antenna names from wiring.yaml (falls back to raw inputs when wiring is missing).">
      <input type="checkbox" id="toggle-wiring">
      <span>Wiring labels</span>
    </label>
    <label class="toggle" title="Convert spectra to Kelvin using the most recent RFNON / RFNOFF integrations (first-order Y-factor cal). Falls back to raw with a warning if the on/off cache is missing or stale.">
      <input type="checkbox" id="toggle-calibrated">
      <span>Calibrated (T_sky)</span>
    </label>
  </div>
  <div id="calibration-warning" class="cal-warn" hidden></div>
</header>

<main class="grid">
  <section class="card wide">
    <h2>Correlation spectra</h2>
    <div id="plot-mag" class="plot"></div>
    <div id="plot-phase" class="plot"></div>
  </section>

  <section class="card">
    <h2>RF switch</h2>
    <div id="rfswitch"></div>
  </section>

  <section class="card">
    <h2>ADC (clipping + RMS)</h2>
    <div id="adc-tiles"></div>
  </section>

  <section class="card">
    <h2>Tempctrl</h2>
    <div id="tempctrl-tiles"></div>
  </section>

  <section class="card">
    <h2>Picos (status + age)</h2>
    <div id="metadata-tiles"></div>
  </section>

  <section class="card wide">
    <h2>Event log (status stream)</h2>
    <ul id="status-log"></ul>
  </section>
</main>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
