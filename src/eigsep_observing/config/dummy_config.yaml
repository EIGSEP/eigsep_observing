# dummy_config file for running on a single machine

# IP addresses
rpi_ip: "localhost"
panda_ip: "localhost"
# corr filewriter
corr_save_dir: "/home/christian/Documents/research/eigsep/eigsep_observing/test_data"
corr_ntimes: 240
# switches
use_switches: true
switch_schedule:  # seconds per measurement
  RFANT: 30  # sky
  RFNOFF: 20  # load
  RFNON: 20  # noise source
# vna
use_vna: true
vna_interval: 10  # seconds between VNA measurements
vna_ip: "127.0.0.1"
vna_port: 5025
vna_timeout: 1  # in seconds
vna_settings:
  fstart: 1000000.0  # in Hz
  fstop: 250000000.0  # in Hz
  npoints: 1000
  ifbw: 100.0  # in Hz
  power_dBm:
    ant: 0.0
    rec: -40.0
vna_save_dir: "/home/christian/Documents/research/eigsep/eigsep_observing/test_s11_data"
# motor
use_motor: true
motor_interval: 1  # seconds between scans
motor_failure_retry_s: 0.5  # fast retry for tests
motor_scan: {}

# motion-switch coordination (default off; tests opt in per-fixture)
serialize_motion_and_switching: false

# vna position sweep (used by scripts/vna_position_sweep.py)
vna_position_sweep:
  az_grid_deg: [-1.0, 1.0]
  el_grid_deg: [-1.0, 1.0]
  settle_s: 0.0
# tempctrl
use_tempctrl: true
tempctrl_interval: 1  # seconds; short for tests
tempctrl_settings:
  watchdog_timeout_ms: 30000
  LNA:
    enable: true
    target_C: 25.0
    hysteresis_C: 0.5
    clamp: 0.6
  LOAD:
    enable: true
    target_C: 25.0
    hysteresis_C: 0.5
    clamp: 0.6
