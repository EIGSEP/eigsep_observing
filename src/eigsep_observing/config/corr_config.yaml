snap_ip: "10.10.10.12"
fpg_file: "eigsep_fengine_1g_v2_3_2024-07-08_1858.fpg"  # path to fpg file
fpg_version: [2, 3]  # major, minor
sample_rate: 500.0  # in MHz
nchan: 1024
use_ref: false  # use synth on snap to generate adc clock from 10 MHz ref
use_noise: false  # use digital noise instead of ADC data
adc_gain: 4
fft_shift: 0x015F
corr_acc_len: 0x10000000  # 2**28 - increment corr_acc_cnt by ~1/second
#corr_acc_len: 0x04000000  # 2**26 - increment corr_acc_cnt by ~4/second
corr_scalar: 512  # 2**9 - 8 bits after binary point so 2**9 = 1
corr_word: 4  # 4 bytes per word
acc_bins: 2
avg_even_odd: true  # average even/odd spectra at file-write time
dtype: ">i4"  # big-endian int32
pol_delay:
  "01": 0
  "23": 0
  "45": 0
redis:
  host: localhost
  port: 6379
pairs: ["0", "1", "2", "3", "4", "5", "02", "04", "13", "15", "24", "35"]
# Cadence for raw ADC snapshot publishing to Redis (seconds between
# frames). Set to null or 0 to disable. Stats (mean/power/RMS per
# ADC core) publish every integration regardless and land in the
# corr file via the metadata-averaging path — this period only
# controls the raw-samples stream, which is diagnostic-only.
adc_snapshot_period_s: 1.0
# Hardware wiring (antenna → FEM → PAM → SNAP input mapping) lives in
# `wiring.yaml`, not here. This file is software-only.
