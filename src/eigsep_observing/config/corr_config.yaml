snap_ip: "10.10.10.12"
# Per-transfer TAPCP/tftpy socket timeout [s]. tftpy recovers a lost
# UDP packet only by waiting out this timeout before retransmitting,
# so it sets the stall cost of a single lost packet on the SNAP link.
# casperfpga's default of 3 s spans 2-3 integration windows at
# corr_acc_len 2**28 and was the root cause of the periodic
# "Dropped 2 integration(s)" warnings (issue #204). 0.25 s is ~100x
# the observed per-block readout cadence, so only a genuinely lost
# packet ever waits this long; casperfpga's 8 transaction-level
# retries are unaffected. Absent -> defaults to 0.25.
tapcp_timeout_s: 0.25
fpg_file: "eigsep_fengine_1g_v2_4_2026-06-23_2052.fpg"  # path to fpg file
fpg_version: [2, 4]  # major, minor
sample_rate: 500.0  # in MHz
nchan: 1024
use_ref: false  # use synth on snap to generate adc clock from 10 MHz ref
use_noise: false  # use digital noise instead of ADC data
adc_gain: 4
fft_shift: 0x015F
corr_acc_len: 0x10000000  # 2**28 fabric clocks (250 MHz): 1 tick / 1.074 s
#corr_acc_len: 0x04000000  # 2**26 fabric clocks: 1 tick / 0.268 s
corr_scalar: 512  # 2**9 - 8 bits after binary point so 2**9 = 1
corr_word: 4  # 4 bytes per word
# acc_bins / avg_even_odd are DECLARED defaults only. The producer
# derives the true data layout from the firmware version register and
# overwrites these at runtime (firmware >= 2.4 emits one spectrum =>
# acc_bins 1; earlier firmware emits even/odd => acc_bins 2). On an
# emergency revert to a v2.3 bitstream, swap fpg_file + fpg_version and
# the layout follows automatically (with a WARNING if these disagree).
acc_bins: 1
avg_even_odd: false
dtype: ">i4"  # big-endian int32
pol_delay:
  "01": 0
  "23": 0
  "45": 0
redis:
  host: localhost
  port: 6379
# Input multiplexing (firmware >= 2.4 only). Copies an even input's
# digitized stream into the odd input above it, filling otherwise-dead
# odd-triad cross slots. Entries are [bit0, bit1, bit2] =
# [input1<-ant0, input3<-ant2, input5<-ant4]; register int = b0+2*b1+4*b2.
# All-false = no mux (identity, pre-v2.4 behavior). Likely field case:
# [true, true, false] (register value 3). Ignored on firmware < 2.4.
adc_mux_sel: [false, false, false]
pairs: ["0", "1", "2", "3", "4", "5", "02", "04", "13", "15", "24", "35"]
# Cadence [s] of the ADC snapshot tick. Each tick grabs one set of
# snapshot frames off the FPGA and feeds BOTH ADC diagnostics: the
# raw-samples stream (Redis-only) and adc_stats (per-core ADC
# mean/power/RMS derived from the same frames — the flashed
# bitstreams have no input_rms_* hardware accumulators), which lands
# in corr files via the metadata-averaging path. Set to null or 0 to
# disable both.
#
# Bounds on the value: keep it well below the metadata
# stream-freshness window (max_age_s, 30 s) or zero-entry drains
# late in the period log spurious stale warnings; and not so low
# that the snapshot BRAM reads contend with the corr poll on the
# shared TAPCP transport (serialized via ``_FpgaLockProxy``, and
# benched OK at 1 s by ``scripts/adc_snapshot_bench.py`` on lab
# hardware — re-run the bench on the deployment SNAP if lowering
# this on a link with heavy TAPCP loss, cf. issue #204). 20 s is
# 20x gentler than the benched load with 10 s of freshness margin.
adc_snapshot_period_s: 20
# Cadence [s] for corr_health (cumulative dropped-integration count +
# latest readout wall-time, dashboard-only Redis K/V; the file records
# drops as acc_cnt gaps). Publishes on a throttled background thread
# that only snapshots in-memory counters — no FPGA access — so 1 s is
# free. Set to 0 to disable; absent → defaults to 1.0.
diagnostics_period_s: 1.0
# Per-channel linear-range calibration product (npz in the packaged
# data/ dir, produced by scripts/linearity_test/fit_linearity.py).
# When set, the file writer embeds linear_range_min/max in corr
# headers and live-status draws them as dashed bounds on the corr
# plot — both after validating the product's operating point against
# the live corr header (mismatch => ERROR log, bounds omitted).
# null = feature off (no product measured for this operating point).
# Current product: 2026-07-08 lab sweep, inputs 0/2/3/4/5 (input 1
# unused in the field), conservative cross-input envelope.
linear_range_file: "corr_linear_range_v2_4_2026-07-08.npz"
# Hardware wiring (antenna → Rx module → SNAP input mapping) lives in
# `wiring.yaml`, not here. This file is software-only.
