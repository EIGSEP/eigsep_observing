snap_ip: "10.10.10.12"
fpg_file: "eigsep_fengine_1g_v_2_4.fpg"  # path to fpg file
fpg_version: [2, 4]  # major, minor
sample_rate: 500.0  # in MHz
nchan: 1024
use_ref: false  # use synth on snap to generate adc clock from 10 MHz ref
use_noise: false  # use digital noise instead of ADC data
adc_gain: 4
fft_shift: 0x015F
corr_acc_len: 0x10000000  # 2**28 - increment corr_acc_cnt by ~2/second (v2.4)
#corr_acc_len: 0x04000000  # 2**26 - increment corr_acc_cnt by ~8/second
corr_scalar: 512  # 2**9 - 8 bits after binary point so 2**9 = 1
corr_word: 4  # 4 bytes per word
# acc_bins / avg_even_odd are DECLARED defaults only. The producer
# derives the true data layout from the firmware version register and
# overwrites these at runtime (firmware >= 2.4 emits one spectrum =>
# acc_bins 1; earlier firmware emits even/odd => acc_bins 2). On an
# emergency revert to a v2.3 bitstream, swap fpg_file + fpg_version and
# the layout follows automatically (with a WARNING if these disagree).
acc_bins: 1
avg_even_odd: false
dtype: ">i4"  # big-endian int32
pol_delay:
  "01": 0
  "23": 0
  "45": 0
redis:
  host: localhost
  port: 6379
pairs: ["0", "1", "2", "3", "4", "5", "02", "04", "13", "15", "24", "35"]
# Cadence for raw ADC snapshot publishing to Redis (seconds between
# frames). Set to null or 0 to disable. This period only controls the
# raw-samples stream, which is diagnostic-only. Stats (mean/power/RMS
# per ADC core) publish on ``diagnostics_period_s`` below and land in
# the corr file via the metadata-averaging path.
#
# Default off: the snapshot publisher shares one casperfpga TAPCP
# transport with the corr loop, so enabling it puts the corr poll
# in contention with the snapshot reads. The transport is
# serialized via ``_FpgaLockProxy``, but the loaded path has not
# been validated on the deployment hardware — run
# ``scripts/adc_snapshot_bench.py`` against the target SNAP and
# confirm corr-poll latency stays inside the acceptance bar before
# flipping a nonzero value here.
adc_snapshot_period_s: 0
# Cadence [s] for SNAP-side diagnostics — adc_stats (per-core ADC
# mean/power/RMS, metadata stream → corr file) and corr_health
# (cumulative dropped-integration count + latest readout wall-time,
# dashboard-only Redis K/V; the file records drops as acc_cnt gaps).
# These publish on a throttled background thread instead of once per
# integration, keeping the corr read path (which must beat the FPGA's
# BRAM overwrite) free of an extra register read and Redis write — the
# headroom that matters as corr_acc_len is lowered. Set to 0 to disable
# both; absent → defaults to 1.0.
diagnostics_period_s: 1.0
# Hardware wiring (antenna → FEM → PAM → SNAP input mapping) lives in
# `wiring.yaml`, not here. This file is software-only.
