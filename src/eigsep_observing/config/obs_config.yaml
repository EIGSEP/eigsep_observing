# High-level configuration for EIGSEP observations
# Sets switch schedules, picos, VNA settings, and other parameters

# IP addresses
rpi_ip: "10.10.10.10"
panda_ip: "10.10.10.11"

# corr filewriter
corr_save_dir: "/media/eigsep/T7/data"
corr_ntimes: 240

# switches
use_switches: true
switch_schedule:  # seconds per measurement
  RFANT: 3600  # sky
  RFNOFF: 60  # noise source off (offline cross-check)
  RFNON: 60  # noise source on (Y-factor hot reference)
  RFAMB: 60  # ambient load (Y-factor cold reference)
  RFSP1_SHORT: 60  # Spare 1 port, SHORT termination, see switch_connections
  RFSP1_OPEN: 60  # Spare 1 port, OPEN termination, see switch_connections

# What is physically connected to the spare rfswitch ports right now.
# Purely descriptive — no code reads it. It rides into every corr and
# VNA file header via the obs_config embed, so each file records the
# wiring that was active when it was written. Update on every rewire.
switch_connections:
  SP1: "long coax cable -> failsafe termination switch (SHORT when unpowered/default, OPEN when driven from potmon GPIO 27)"  # operator: record cable length on install
  SP2: null  # unconnected

# vna
use_vna: true
vna_interval: 3600  # seconds between VNA measurements
vna_ip: "127.0.0.1"
vna_port: 5025
vna_timeout: 1000  # in seconds
vna_settings:
  fstart: 1000000.0  # in Hz
  fstop: 250000000.0  # in Hz
  npoints: 1000
  ifbw: 100.0  # in Hz
  power_dBm:
    ant: 0.0
    rec: -40.0

# motor
use_motor: false
motor_interval: 3600  # seconds between scans
motor_failure_retry_s: 60  # shorter wait after a failed scan to home
motor_scan: {}  # kwargs forwarded to MotorClient.scan; {}
# Motor safe-travel limits are now rig-wide in the MotorLimitStore Redis K/V,
# set via scripts/set_motor_limits.py (read by every MotorClient). They are
# intentionally NOT here. motor_client_kwargs may still carry non-limit
# MotorClient kwargs (step delays, poll interval) if needed.
motor_client_kwargs: {}
home_after_scan: false  # closed-loop return-to-home after each scan
motor_homer_kwargs:     # forwarded to MotorHomer (only used when home_after_scan: true)
  tol_az_deg: 3.0
  tol_el_deg: 2.0
  settle_s: 10.0
  damping: 0.5
  max_iters: 6
  reset_count: true

# motion-switch coordination
# When true, motor moves and RF switching mutually exclude each other
# at per-move granularity. Default off — opt in if motor stepping pulses
# turn out to bleed RF interference into VNA/correlator data.
serialize_motion_and_switching: false

# vna position sweep (used by src/eigsep_observing/scripts/vna_position_sweep.py)
vna_position_sweep:
  az_grid_deg: [0, 90, 180, 270]
  el_grid_deg: [0, 90, 180, 270]
  settle_s: 2.0  # post-move dwell before VNA fires

# live-status first-order Y-factor calibration (display-only).
# The dashboard's "Calibrated" toggle reads these to convert raw corr
# power to Kelvin using the most recent RFNON / RFAMB integrations
# (RFNOFF is still visited each cycle as an offline cross-check; with
# the diode off it should land near the pad ambient T_ns below).
# This is intentionally not the science-grade cal — that lives in a
# separate offline pipeline.
#
# Noise-source wiring: a noise diode (noise_diode_enr_db, IEEE ENR re
# 290 K) feeds a noise_source_atten_db pad into the switch's noise
# port. The pad's own thermal emission cancels in the diode on−off
# difference, so the excess at the switch is
#   T_ENR = 290 K · 10^((noise_diode_enr_db − noise_source_atten_db)/10)
# (35 − 30 dB → effective 5 dB ≈ 917 K). The two reference planes:
#   T_hot = T_ns + T_ENR   (RFNON; T_ns = pad physical temp, from the
#                           RF-switch PCB thermistor nearest the pad)
#   T_amb                  (RFAMB; ambient load temp, from tempctrl)
# Y-factor: G = (P_on − P_amb) / (T_hot − T_amb)
#           T_in = P / G − T_rx,  T_rx = P_amb / G − T_amb
calibration:
  noise_diode_enr_db: 35.0  # diode ENR at its output plane (dB re 290 K)
  noise_source_atten_db: 30.0  # pad between diode and switch (dB)
  # Noise-source pad physical temperature (T_ns above).
  # !!! UNVERIFIED: temp_therm2 is assumed to be the thermistor nearest
  # !!! the noise-source pad ("thermistor 3"), but the temp_therm0/1/2
  # !!! <-> PCB-position mapping has NOT been checked against the
  # !!! hardware. Verify on the board and fix before field deploy.
  # temp_therm* may be None (dead/shorted channel, or ADC saturation
  # below ~8.5 C) — the cal disables cleanly until the reading returns.
  t_ns_stream: rfswitch_therm
  t_ns_field: temp_therm2
  # Ambient-load temperature (T_amb above, the RFAMB path). The
  # tempctrl hot-swap contingency re-points this at tempctrl_lna — see
  # OPERATIONS.md "Tempctrl channel descope and hot-swap".
  t_amb_stream: tempctrl_load
  t_amb_field: T_now

# tempctrl
use_tempctrl: false
tempctrl_interval: 60  # seconds between setpoint re-apply + health check
tempctrl_settings:
  watchdog_timeout_ms: 30000
  LNA:
    # Hardware descope flag: false means the channel's Peltier +
    # thermistor module is physically absent — firmware never samples
    # or drives it and its tempctrl_lna stream stops publishing
    # entirely (no corr-file column, no dashboard tiles, no health
    # checks). Must be paired with enable: false. Flip back to true
    # when the module is (re)connected. See OPERATIONS.md "Tempctrl
    # channel descope and hot-swap".
    installed: true
    enable: true
    target_C: 25.0
    hysteresis_C: 0.5
    clamp: 0.6  # max drive duty [0, 1]
    # Asymmetric-clamp safety guard. False forbids negative (cooling)
    # drive, clamping firmware-side to [0, +clamp]. Default false here
    # because the field rig cannot reliably dissipate the Peltier
    # hot-side load: a channel commanded to cool then heats and runs
    # away (no isolation). Set true per channel only after verifying
    # that side can shed its hot-side heat. See pico-firmware
    # tempctrl.c (lower_clamp) for the firmware behavior.
    cooling_enabled: false
  LOAD:
    installed: true  # see the LNA block's descope note
    enable: true
    target_C: 25.0
    hysteresis_C: 0.5
    clamp: 0.6
    cooling_enabled: false
