# High-level configuration for EIGSEP observations
# Sets switch schedules, picos, VNA settings, and other parameters

# IP addresses
rpi_ip: "10.10.10.10"
panda_ip: "10.10.10.20"
# picos
pico_config_file: "/home/eigsep/eigsep/pico-firmware/pico_config.json"
pico_app_mapping:  # app number to device mapping
  0: "motor"
  1: "tempctrl"
  2: "potmon"
  3: "imu_el"
  4: "lidar"
  5: "rfswitch"
  6: "imu_az"
# corr filewriter
corr_save_dir: "/home/eigsep/eigsep/eigsep_observing/test_data"
corr_ntimes: 240
# switches
use_switches: true
switch_schedule:  # seconds per measurement
  RFANT: 100  # sky
  RFNOFF: 20  # noise source off (offline cross-check)
  RFNON: 20  # noise source on (Y-factor hot reference)
  RFAMB: 20  # ambient load (Y-factor cold reference)
  RFSP1_SHORT: 20  # Spare 1 port, SHORT termination, see switch_connections
  RFSP1_OPEN: 20  # Spare 1 port, OPEN termination, see switch_connections
switch_connections:
  SP1: "long coax cable, open end"
  SP2: null
# vna
use_vna: false
vna_interval: 300  # seconds between VNA measurements
vna_ip: "127.0.0.1"
vna_port: 5025
vna_timeout: 1000  # in seconds
vna_settings:
  fstart: 1000000.0  # in Hz
  fstop: 250000000.0  # in Hz
  npoints: 1000
  ifbw: 100.0  # in Hz
  power_dBm:
    ant: 0.0
    rec: -40.0
